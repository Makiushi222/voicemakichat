<!DOCTYPE html>
<html>

<head>
<title>Velora v5</title>
<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:380px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.start{background:#22c55e;color:white;}
.next{background:#ef4444;color:white;}
.mute{background:#3b82f6;color:white;}

#chat{
    height:120px;
    overflow:auto;
    background:#0b1220;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    text-align:left;
}

input{
    width:70%;
    padding:8px;
    border-radius:8px;
    border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>Velora v5</h2>

<p id="status">Idle</p>

<button class="start" onclick="start()">Start</button>
<button class="next" onclick="next()">Next</button>
<button class="mute" onclick="toggleMute()">Mute</button>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let stream;
let peer;
let roomId;
let muted=false;

const chat = document.getElementById("chat");

function add(msg){
    const d=document.createElement("div");
    d.innerText=msg;
    chat.appendChild(d);
}

async function start(){

    stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    socket.emit("findMatch");
}

function next(){
    socket.emit("next");
    socket.emit("findMatch");
}

function toggleMute(){

    muted=!muted;

    stream.getAudioTracks().forEach(t=>{
        t.enabled=!muted;
    });

    socket.emit("mute-state",{roomId,isMuted:muted});
}

function send(){

    const text=document.getElementById("msg").value;

    socket.emit("message",{roomId,text});

    add("You: "+text);
}

function createPeer(){

    peer = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    stream.getTracks().forEach(t=>{
        peer.addTrack(t,stream);
    });

    peer.ontrack=(e)=>{

        const audio=document.createElement("audio");
        audio.srcObject=e.streams[0];
        audio.autoplay=true;
        document.body.appendChild(audio);
    };

    peer.onicecandidate=(e)=>{
        if(e.candidate){
            socket.emit("ice-candidate",{roomId,candidate:e.candidate});
        }
    };
}

socket.on("matched",(data)=>{

    roomId=data.roomId;

    createPeer();

    if(data.isCaller){

        peer.createOffer().then(o=>{
            peer.setLocalDescription(o);
            socket.emit("offer",{roomId,offer:o});
        });
    }
});

socket.on("offer",async(o)=>{

    await peer.setRemoteDescription(o);

    const ans=await peer.createAnswer();
    await peer.setLocalDescription(ans);

    socket.emit("answer",{roomId,answer:ans});
});

socket.on("answer",a=>{
    peer.setRemoteDescription(a);
});

socket.on("ice-candidate",async(c)=>{
    try{await peer.addIceCandidate(c);}catch(e){}
});

socket.on("message",(d)=>{
    add("Partner: "+d.text);
});

socket.on("partner-left",()=>{
    add("Partner disconnected");
});

socket.on("waiting",()=>{
    document.getElementById("status").innerText="Waiting...";
});

</script>

</body>
</html>
