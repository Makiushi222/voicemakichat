<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora</title>

<style>

body{
    margin:0;
    background: radial-gradient(circle,#0f172a,#020617);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    width:370px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* LOGO */
.logo{
    width:90px;
    height:90px;
    border-radius:18px;
    object-fit:cover;
    transition:0.25s ease;
    box-shadow:0 0 10px rgba(148,163,184,0.3);
}

/* GREEN */
.logo.speaking{
    box-shadow:0 0 20px #22c55e,
               0 0 40px #22c55e;
}

/* PURPLE (you muted) */
.logo.selfMuted{
    box-shadow:0 0 20px #a855f7,
               0 0 40px #a855f7;
}

/* RED (partner muted) */
.logo.partnerMuted{
    box-shadow:0 0 20px #ef4444,
               0 0 40px #ef4444;
}

/* STATUS */
#status{
    color:#94a3b8;
    margin:15px 0;
}

/* BUTTONS */
button{
    border:none;
    padding:12px 18px;
    margin:6px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.start{background:#22c55e;color:white;}
.next{background:#ef4444;color:white;}
.mute{background:#3b82f6;color:white;}

/* DISCONNECT TOAST */
.toast{
    margin-top:12px;
    padding:12px 16px;
    border-radius:12px;
    background:rgba(239,68,68,0.15);
    border:1px solid rgba(239,68,68,0.5);
    color:#ef4444;
    font-weight:bold;
}

.hidden{display:none;}

/* FLASH */
body.flash-red{
    animation:flash 0.6s ease;
}

@keyframes flash{
    0%{background:#0f172a;}
    50%{background:rgba(239,68,68,0.25);}
    100%{background:#0f172a;}
}

audio{display:none;}

</style>
</head>

<body>

<div class="container">

<img src="/velora.jpg" class="logo" id="logo">

<h1>Velora</h1>

<p id="status">Idle</p>

<button class="start" onclick="startChat()">Start </button>
<button class="next" onclick="nextUser()">Next</button>
<button class="mute" id="muteBtn" onclick="toggleMute()">Mute 🎤</button>

<div id="toast" class="toast hidden">
    ❌ User disconnected
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let peer;
let roomId;

let isMuted = false;
let partnerMuted = false;

const logo = document.getElementById("logo");
const statusText = document.getElementById("status");
const toast = document.getElementById("toast");

// 🎯 UPDATE UI STATE
function updateLogo(){

    logo.classList.remove("speaking","selfMuted","partnerMuted");

    if(isMuted){
        logo.classList.add("selfMuted");
    }
    else if(partnerMuted){
        logo.classList.add("partnerMuted");
    }
    else{
        logo.classList.add("speaking");
    }
}

// 🚀 START
async function startChat(){

    try{

        localStream = await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        socket.emit("findMatch");

        statusText.innerText = "Searching...";

    }catch(err){
        alert("Microphone blocked");
    }
}

// ⏭ NEXT
function nextUser(){

    statusText.innerText = "Switching...";

    if(peer){
        peer.close();
        peer = null;
    }

    document.querySelectorAll("audio").forEach(a=>a.remove());

    socket.emit("next");

    setTimeout(()=>{
        socket.emit("findMatch");
    },500);
}

// 🎤 MUTE
function toggleMute(){

    if(!localStream) return;

    isMuted = !isMuted;

    localStream.getAudioTracks().forEach(track=>{
        track.enabled = !isMuted;
    });

    socket.emit("mute-state",{
        roomId,
        isMuted
    });

    updateLogo();
}

// 🔗 PEER
function createPeer(){

    peer = new RTCPeerConnection({
        iceServers:[
            { urls:"stun:stun.l.google.com:19302" }
        ]
    });

    localStream.getTracks().forEach(track=>{
        peer.addTrack(track, localStream);
    });

    peer.ontrack = (event)=>{ const audio = document.createElement("audio");
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
    };

    peer.onicecandidate = (event)=>{
        if(event.candidate){
            socket.emit("ice-candidate",{
                candidate:event.candidate,
                roomId
            });
        }
    };
}

// 🤝 MATCHED
socket.on("matched", async(data)=>{

    roomId = data.roomId;

    isMuted = false;
    partnerMuted = false;

    statusText.innerText = "Connected ✔";

    updateLogo();

    createPeer();

    if(data.isCaller){

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);

        socket.emit("offer",{offer,roomId});
    }
});

// OFFER
socket.on("offer", async(offer)=>{

    if(!peer) createPeer();

    await peer.setRemoteDescription(offer);

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("answer",{answer,roomId});
});

// ANSWER
socket.on("answer", async(answer)=>{
    await peer.setRemoteDescription(answer);
});

// ICE
socket.on("ice-candidate", async(candidate)=>{
    try{
        await peer.addIceCandidate(candidate);
    }catch(e){}
});

// 🔴 PARTNER MUTE
socket.on("partner-mute-state",(data)=>{
    partnerMuted = data.isMuted;
    updateLogo();
});

// ❌ DISCONNECT
socket.on("partner-disconnected", ()=>{

    statusText.innerText = "Disconnected";

    toast.classList.remove("hidden");
    document.body.classList.add("flash-red");

    setTimeout(()=>{
        toast.classList.add("hidden");
        document.body.classList.remove("flash-red");
    },3000);

    isMuted = false;
    partnerMuted = false;

    updateLogo();

    if(peer){
        peer.close();
        peer = null;
    }

    document.querySelectorAll("audio").forEach(a=>a.remove());
});

// WAITING
socket.on("waiting", ()=>{
    statusText.innerText = "Waiting...";
});

</script>

</body>
</html>
