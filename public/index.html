<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora</title>

<style>

body{
    margin:0;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    width:370px;
    background: rgba(30,41,59,0.9);
    padding:30px;
    border-radius:22px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* LOGO */
.logo{
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 10px;

    box-shadow: 0 0 25px rgba(34,197,94,0.4),
                0 0 45px rgba(59,130,246,0.3);

    border: 2px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.logo:hover{
    transform: scale(1.05) rotate(2deg);
}

/* TITLE */
h1{
    margin-bottom: 10px;
    font-size: 26px;
    background: linear-gradient(90deg,#22c55e,#38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* STATUS */
#status{
    margin:15px 0;
    color:#94a3b8;
}

/* BUTTONS */
button{
    border:none;
    padding:12px 18px;
    margin:8px;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.start{background:#22c55e;color:white;}
.next{background:#ef4444;color:white;}

audio{
    width:100%;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<img src="/logo.jpeg" class="logo">

<h1>Velora</h1>

<p id="status">Idle</p>

<button class="start" onclick="startChat()">Start Chat</button>
<button class="next" onclick="nextUser()">Next</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let peer;
let roomId;
let isCaller = false;

const statusText = document.getElementById("status");

const servers = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
    ]
};

// START CHAT
async function startChat(){

    try{

        localStream = await navigator.mediaDevices.getUserMedia({
            audio:true
        });

        socket.emit("findMatch");

        statusText.innerText = "Searching...";

    }catch(err){
        alert("Microphone blocked!");
    }
}

// NEXT USER
function nextUser(){

    statusText.innerText = "Switching...";

    if(peer){
        peer.close();
        peer = null;
    }

    document.querySelectorAll("audio").forEach(a => a.remove());

    socket.emit("next");

    setTimeout(() => {
        socket.emit("findMatch");
    }, 500);
}

// CREATE PEER
function createPeer(){

    peer = new RTCPeerConnection({
        iceServers: servers.iceServers
    });

    localStream.getTracks().forEach(track=>{
        peer.addTrack(track, localStream);
    });

    peer.ontrack = (event)=>{

        const audio = document.createElement("audio");

        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.controls = true;

        document.body.appendChild(audio);

        audio.onloadedmetadata = () => {
            audio.play().catch(()=>{});
        };
    };

    peer.onicecandidate = (event)=>{
        if(event.candidate){
            socket.emit("ice-candidate",{
                candidate:event.candidate,
                roomId
            });
        }
    };
}

// MATCHED
socket.on("matched", async(data)=>{

    roomId = data.roomId;
    isCaller = data.isCaller;

    statusText.innerText = "Connected ✔";

    createPeer();

    if(isCaller){

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);

        socket.emit("offer", { offer, roomId });
    }
});

// OFFER
socket.on("offer", async(offer)=>{

    if(!peer) createPeer();

    await peer.setRemoteDescription(offer);

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("answer", { answer, roomId });
});

// ANSWER
socket.on("answer", async(answer)=>{
    await peer.setRemoteDescription(answer);
});

// ICE
socket.on("ice-candidate", async(candidate)=>{
    try{
        await peer.addIceCandidate(candidate);
    }catch(e){}
});

// DISCONNECT
socket.on("partner-disconnected", ()=>{
    statusText.innerText = "User disconnected";

    if(peer){
        peer.close();
        peer = null;
    }

    document.querySelectorAll("audio").forEach(a=>a.remove());
});

// WAITING
socket.on("waiting", ()=>{
    statusText.innerText = "Waiting...";
});

</script>

</body>
</html>
