<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora v3</title>

<style>

body{
    margin:0;
    background: radial-gradient(circle,#0f172a,#020617);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:370px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.logo{
    width:90px;
    height:90px;
    border-radius:18px;
    object-fit:cover;
    transition:0.3s;
}

/* speaking */
.logo.speaking{
    box-shadow:0 0 20px #22c55e, 0 0 40px #22c55e;
}

/* self muted */
.logo.selfMuted{
    box-shadow:0 0 20px #a855f7, 0 0 40px #a855f7;
}

/* partner muted */
.logo.partnerMuted{
    box-shadow:0 0 20px #ef4444, 0 0 40px #ef4444;
}

#status{
    color:#94a3b8;
    margin:15px 0;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.start{background:#22c55e;color:white;}
.next{background:#ef4444;color:white;}
.mute{background:#3b82f6;color:white;}

.toast{
    margin-top:10px;
    background:rgba(239,68,68,0.15);
    border:1px solid #ef4444;
    padding:10px;
    border-radius:10px;
    display:none;
}

audio{display:none;}

</style>
</head>

<body>

<div class="container">

<img src="/velora.jpg" class="logo" id="logo">

<h1>Velora v3</h1>

<p id="status">Idle</p>

<button class="start" onclick="startChat()">Start</button>
<button class="next" onclick="nextUser()">Next</button>
<button class="mute" onclick="toggleMute()">Mute</button>

<div class="toast" id="toast">User disconnected</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let peer;
let roomId;

let isMuted = false;
let partnerMuted = false;

const logo = document.getElementById("logo");
const statusText = document.getElementById("status");
const toast = document.getElementById("toast");

function updateUI(){

    logo.classList.remove("speaking","selfMuted","partnerMuted");

    if(isMuted){
        logo.classList.add("selfMuted");
    }
    else if(partnerMuted){
        logo.classList.add("partnerMuted");
    }
    else{
        logo.classList.add("speaking");
    }
}

async function startChat(){

    localStream = await navigator.mediaDevices.getUserMedia({ audio:true });

    socket.emit("findMatch");

    statusText.innerText = "Searching...";
}

function nextUser(){

    if(peer) peer.close();

    socket.emit("next");
    socket.emit("findMatch");

    statusText.innerText = "Searching...";
}

function toggleMute(){

    isMuted = !isMuted;

    localStream.getAudioTracks().forEach(t=>{
        t.enabled = !isMuted;
    });

    socket.emit("mute-state",{roomId,isMuted});

    updateUI();
}

function createPeer(){

    peer = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    localStream.getTracks().forEach(track=>{
        peer.addTrack(track, localStream);
    });

    peer.ontrack = (e)=>{

        const audio = document.createElement("audio");
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
    };

    peer.onicecandidate = (e)=>{
        if(e.candidate){
            socket.emit("ice-candidate",{candidate:e.candidate,roomId});
        }
    };
}

socket.on("matched", async(data)=>{

    roomId = data.roomId;

    isMuted = false;
    partnerMuted = false;

    statusText.innerText = "Connected";

    updateUI();

    createPeer();

    if(data.isCaller){

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);

        socket.emit("offer",{offer,roomId});
    }
});

socket.on("offer", async(offer)=>{

    if(!peer) createPeer();

    await peer.setRemoteDescription(offer);

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("answer",{answer,roomId});
});

socket.on("answer", async(answer)=>{
    await peer.setRemoteDescription(answer);
});

socket.on("ice-candidate", async(c)=>{
    try{
        await peer.addIceCandidate(c);
    }catch(e){}
});

socket.on("partner-mute-state",(d)=>{
    partnerMuted = d.isMuted;
    updateUI();
});

socket.on("partner-disconnected",()=>{
    toast.style.display="block";

    setTimeout(()=>{
        toast.style.display="none";
    },3000);

    if(peer) peer.close();

    statusText.innerText="Disconnected";
});

socket.on("waiting",()=>{
    statusText.innerText="Waiting...";
});

</script>

</body>
</html>
