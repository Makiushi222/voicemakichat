<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>
</head>
<body>

<h2>Random Voice Chat 🎤</h2>

<button onclick="enableMic()">Enable Mic 🎤</button>
<button onclick="findMatch()">Start</button>

<p id="status">Not connected</p>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let localStream;
let peerConnection;
let roomId;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// 🎤 تشغيل المايك
async function enableMic() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        document.getElementById("status").innerText = "Mic enabled ✔";
        console.log("Mic ON");
    } catch (e) {
        console.log("Mic error", e);
        alert("Microphone blocked!");
    }
}

// 🔍 بحث عن شخص
function findMatch() {
    socket.emit("findMatch");
    document.getElementById("status").innerText = "Searching...";
}

// 🟢 عند التطابق
socket.on("matched", async (id) => {
    roomId = id;
    document.getElementById("status").innerText = "Matched ✔";

    if (!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    createPeer();

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit("offer", { offer, roomId });
});

// 🟢 إنشاء الاتصال
function createPeer() {
    peerConnection = new RTCPeerConnection(config);

    // إضافة الصوت
    localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
    });

    // استقبال الصوت
    peerConnection.ontrack = (event) => {
        const audio = document.createElement("audio");
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.controls = true;
        document.body.appendChild(audio);
        audio.play().catch(()=>{});
    };

    // ICE
    peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("ice-candidate", {
                candidate: event.candidate,
                roomId
            });
        }
    };
}

// 🟢 استقبال offer
socket.on("offer", async (offer) => {

    if (!peerConnection) createPeer();

    await peerConnection.setRemoteDescription(offer);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("answer", { answer, roomId });
});

// 🟢 answer
socket.on("answer", async (answer) => {
    await peerConnection.setRemoteDescription(answer);
});

// 🟢 ICE
socket.on("ice-candidate", async (candidate) => {
    try {
        await peerConnection.addIceCandidate(candidate);
    } catch (e) {
        console.log(e);
    }
});
</script>

</body>
</html>
