<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat FIX</title>
</head>
<body>

<h2>Voice Chat 🎤</h2>

<button onclick="start()">Start</button>
<button onclick="enableMic()">Enable Mic</button>

<p id="status">Idle</p>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let localStream;
let peer;
let roomId;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// 🟢 mic
async function enableMic() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    document.getElementById("status").innerText = "Mic ON ✔";
}

// 🟢 start
function start() {
    socket.emit("findMatch");
    document.getElementById("status").innerText = "Searching...";
}

// 🟢 create peer (IMPORTANT FIX)
function createPeer() {

    peer = new RTCPeerConnection(config);

    // ADD TRACKS FIRST (VERY IMPORTANT)
    localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
    });

    // RECEIVE AUDIO
    peer.ontrack = (event) => {
        console.log("TRACK RECEIVED ✔");

        const audio = document.createElement("audio");
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.playsInline = true;
        audio.controls = true;

        document.body.appendChild(audio);

        audio.play().catch(err => console.log(err));
    };

    // ICE
    peer.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("ice-candidate", {
                candidate: event.candidate,
                roomId
            });
        }
    };
}

// 🟢 matched
socket.on("matched", async (id) => {
    roomId = id;

    document.getElementById("status").innerText = "Matched ✔";

    if (!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    createPeer();

    // WAIT 500ms (IMPORTANT FIX)
    setTimeout(async () => {

        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);

        socket.emit("offer", { offer, roomId });

    }, 500);
});

// 🟢 offer
socket.on("offer", async (offer) => {

    if (!peer) createPeer();

    await peer.setRemoteDescription(offer);

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("answer", { answer, roomId });
});

// 🟢 answer
socket.on("answer", async (answer) => {
    await peer.setRemoteDescription(answer);
});

// 🟢 ICE
socket.on("ice-candidate", async (candidate) => {
    try {
        await peer.addIceCandidate(candidate);
    } catch (e) {
        console.log(e);
    }
});
</script>

</body>
</html>
