<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>
</head>
<body>

<h2>Voice Chat 🎤</h2>

<button onclick="enableMic()">Enable Mic</button>
<button onclick="start()">Start</button>

<p id="status">Idle</p>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let localStream;
let peer;
let roomId;
let isCaller = false;

const servers = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// 🟢 mic
async function enableMic() {
    localStream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    document.getElementById("status").innerText = "Mic enabled ✔️";
}

// 🟢 start
function start() {
    socket.emit("findMatch");
    document.getElementById("status").innerText = "Searching...";
}

// 🟢 peer
function createPeer() {

    peer = new RTCPeerConnection(servers);

    // SEND AUDIO
    localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
    });

    // RECEIVE AUDIO
    peer.ontrack = (event) => {

        console.log("TRACK RECEIVED ✔️");

        const audio = document.createElement("audio");

        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.controls = true;
        audio.playsInline = true;

        document.body.appendChild(audio);

        audio.play().catch(console.log);
    };

    // ICE
    peer.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("ice-candidate", {
                candidate: event.candidate,
                roomId
            });
        }
    };
}

// 🟢 matched
socket.on("matched", async (data) => {

    roomId = data.roomId;
    isCaller = data.isCaller;

    document.getElementById("status").innerText = "Matched ✔️";

    createPeer();

    // ONLY CALLER SENDS OFFER
    if (isCaller) {

        const offer = await peer.createOffer();

        await peer.setLocalDescription(offer);

        socket.emit("offer", {
            offer,
            roomId
        });
    }
});

// 🟢 offer
socket.on("offer", async (offer) => {

    if (!peer) createPeer();

    await peer.setRemoteDescription(offer);

    const answer = await peer.createAnswer();

    await peer.setLocalDescription(answer);

    socket.emit("answer", {
        answer,
        roomId
    });
});

// 🟢 answer
socket.on("answer", async (answer) => {

    await peer.setRemoteDescription(answer);
});

// 🟢 ice
socket.on("ice-candidate", async (candidate) => {

    try {
        await peer.addIceCandidate(candidate);
    } catch (e) {
        console.log(e);
    }
});
</script>

</body>
</html>
